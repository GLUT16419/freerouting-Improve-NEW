speed_level=布线速度:
speed_level_tooltip=4档布线速度预设。非常快=仅预估；快=骨干+快速填充；中=完整流程平衡模式；慢=完整流程最大迭代以求最佳质量。
speed_very_fast=1 - 非常快
speed_fast=2 - 快
speed_medium=3 - 中 (默认)
speed_slow=4 - 慢 (最佳质量)
