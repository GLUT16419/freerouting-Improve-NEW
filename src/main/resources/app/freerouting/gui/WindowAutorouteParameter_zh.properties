algorithm=算法\:
algorithm_tooltip=选择布线引擎。UTPR V7使用城市交通规划4阶段算法（规划 -> 骨干 -> 城区 -> SAT）；Current使用现代实现；Hybrid使用三阶段算法；v1.9为旧版对比路径。
algorithm_current=Current（默认）
algorithm_hybrid=Hybrid三阶段（实验性）
